<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Back to the Future</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>

<div id="clocks">
    <div id="digital">
        <h5>Doc Brown</h5>

        <!------------------------------------------------------------------------------------------------------------------------------------------------------------------------->
        <!-- !!!! den folgenden Code für die visuelle Darstellung der digitalen Uhr habe ich aus dem Youtube Video "7 Segment Digital Clock - HTML + CSS + JS" von MinzCode !!!! -->
        <!------------------------------------------------------------------------------------------------------------------------------------------------------------------------->

        <!-- SVG => definiert typische Segmentform-->
        <!-- mit <use> wiederverwenden -->
        <svg width="0" height="0" viewBox="0 0 0 0">
            <defs>
                <!--horizontales Segment wird gebaut-->
                <g id="unit-h">
                    <path d="M0 20 L20 40 L180 40 L200 20 L180 0 L20 0 Z"></path>
                </g>
                <!-- vertikales Segment wird gebaut-->
                <g id="unit-v">
                    <path d="M20 0 L0 20 L0 180 L20 200 L40 180 L40 20 Z"></path>
                </g>
            </defs>
        </svg>

        <div class="digital-watch">
            <!-- erste Stelle Stunden -->
            <div class="hour">
                <svg id="hour-1" class="num-0" width="65" height="120" viewBox="0 0 260 480">
                    <use xlink:href="#unit-h" class="segment a" x="30" y="0"></use>     <!-- oben -->
                    <use xlink:href="#unit-v" class="segment b" x="220" y="30"></use>   <!-- oben rechts -->
                    <use xlink:href="#unit-v" class="segment c" x="220" y="250"></use>  <!-- unten rechts -->
                    <use xlink:href="#unit-h" class="segment d" x="30" y="440"></use>   <!-- unten -->
                    <use xlink:href="#unit-v" class="segment e" x="0" y="250"></use>    <!-- unten links -->
                    <use xlink:href="#unit-v" class="segment f" x="0" y="30"></use>     <!-- oben links -->
                    <use xlink:href="#unit-h" class="segment g" x="30" y="220"></use>   <!-- mitte -->
                </svg>
                <!--zweite Stelle Stunden-->
                <svg id="hour-2" class="num-0" width="65" height="120" viewBox="0 0 260 480">
                    <use xlink:href="#unit-h" class="segment a" x="30" y="0"></use>
                    <use xlink:href="#unit-v" class="segment b" x="220" y="30"></use>
                    <use xlink:href="#unit-v" class="segment c" x="220" y="250"></use>
                    <use xlink:href="#unit-h" class="segment d" x="30" y="440"></use>
                    <use xlink:href="#unit-v" class="segment e" x="0" y="250"></use>
                    <use xlink:href="#unit-v" class="segment f" x="0" y="30"></use>
                    <use xlink:href="#unit-h" class="segment g" x="30" y="220"></use>
                </svg>
            </div>

            <!--Minuten-->
            <div class="minute">
                <svg id="minute-1" class="num-0" width="65" height="120" viewBox="0 0 260 480">
                    <use xlink:href="#unit-h" class="segment a" x="30" y="0"></use>
                    <use xlink:href="#unit-v" class="segment b" x="220" y="30"></use>
                    <use xlink:href="#unit-v" class="segment c" x="220" y="250"></use>
                    <use xlink:href="#unit-h" class="segment d" x="30" y="440"></use>
                    <use xlink:href="#unit-v" class="segment e" x="0" y="250"></use>
                    <use xlink:href="#unit-v" class="segment f" x="0" y="30"></use>
                    <use xlink:href="#unit-h" class="segment g" x="30" y="220"></use>
                </svg>
                <svg id="minute-2" class="num-0" width="65" height="120" viewBox="0 0 260 480">
                    <use xlink:href="#unit-h" class="segment a" x="30" y="0"></use>
                    <use xlink:href="#unit-v" class="segment b" x="220" y="30"></use>
                    <use xlink:href="#unit-v" class="segment c" x="220" y="250"></use>
                    <use xlink:href="#unit-h" class="segment d" x="30" y="440"></use>
                    <use xlink:href="#unit-v" class="segment e" x="0" y="250"></use>
                    <use xlink:href="#unit-v" class="segment f" x="0" y="30"></use>
                    <use xlink:href="#unit-h" class="segment g" x="30" y="220"></use>
                </svg>
            </div>

            <!--Sekunden-->
            <div class="second">
                <svg id="second-1" class="num-0" width="65" height="120" viewBox="0 0 260 480">
                    <use xlink:href="#unit-h" class="segment a" x="30" y="0"></use>
                    <use xlink:href="#unit-v" class="segment b" x="220" y="30"></use>
                    <use xlink:href="#unit-v" class="segment c" x="220" y="250"></use>
                    <use xlink:href="#unit-h" class="segment d" x="30" y="440"></use>
                    <use xlink:href="#unit-v" class="segment e" x="0" y="250"></use>
                    <use xlink:href="#unit-v" class="segment f" x="0" y="30"></use>
                    <use xlink:href="#unit-h" class="segment g" x="30" y="220"></use>
                </svg>
                <svg id="second-2" class="num-0" width="65" height="120" viewBox="0 0 260 480">
                    <use xlink:href="#unit-h" class="segment a" x="30" y="0"></use>
                    <use xlink:href="#unit-v" class="segment b" x="220" y="30"></use>
                    <use xlink:href="#unit-v" class="segment c" x="220" y="250"></use>
                    <use xlink:href="#unit-h" class="segment d" x="30" y="440"></use>
                    <use xlink:href="#unit-v" class="segment e" x="0" y="250"></use>
                    <use xlink:href="#unit-v" class="segment f" x="0" y="30"></use>
                    <use xlink:href="#unit-h" class="segment g" x="30" y="220"></use>
                </svg>
            </div>
        </div>
    </div>

    <div id="analogoue">
        <h5>Marty</h5>
    </div>
    <div id="btn"></div>
</div>

<script type="module" src="./js/model.time.js"></script>
<script type="module" src="./js/view.analagoue.js"></script>
<script type="module" src="./js/view.digital.js"></script>
<script type="module" src="./js/controller.js"></script>

</body>
</html>
